openapi: 3.1.0
info:
  title: DocForge API
  description: AI-powered technical documentation generator API
  version: 1.0.0

servers:
  - url: /api

paths:
  /docs/generate:
    post:
      operationId: generateDocs
      summary: Generate documentation from source content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDocsRequest"
      responses:
        "200":
          description: Successfully generated documentation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateDocsResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      operationId: healthCheck
      summary: Health check endpoint
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

components:
  schemas:
    GenerateDocsRequest:
      type: object
      required:
        - content
        - format
      properties:
        content:
          type: string
          description: Source content (code, OpenAPI spec, PR diff, deploy notes)
          minLength: 1
          maxLength: 100000
        format:
          type: string
          enum:
            - readme
            - api-reference
            - changelog
            - onboarding
          description: Output documentation format

    GenerateDocsResponse:
      type: object
      required:
        - documentation
        - format
      properties:
        documentation:
          type: string
          description: Generated Markdown documentation
        format:
          type: string
          description: Documentation format that was generated

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string

    HealthResponse:
      type: object
      required:
        - status
        - timestamp
      properties:
        status:
          type: string
          enum:
            - healthy
        timestamp:
          type: string
          format: date-time
